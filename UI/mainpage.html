<style data-purpose="mic">
  /* ── Base mic button (scaled down from its natural 350px size) ── */
  .mic-wrapper {
    position: fixed;
    bottom: 80px;
    left: 50%;
    /* Scale the whole thing down; the pseudo-elements render at full size internally */
    transform: translateX(-50%) scale(0.25);
    transform-origin: bottom center;
    z-index: 50;
    cursor: pointer;
    border: none;
    background: none;
    /* transition on filter so recording glow fades in/out */
    transition: filter 0.35s ease, opacity 0.3s ease;
  }

  /* Outer glow ring */
  .mic-wrapper::before {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    z-index: 2;
    width: 300px; height: 300px;
    background-color: var(--c10);
    box-shadow: 0 0 20px 30px var(--c12);
    /* smooth color change */
    transition: background-color 0.35s ease, box-shadow 0.35s ease;
  }

  /* Inner pulsing circle */
  .mic-wrapper::after {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    z-index: 2;
    width: 50px; height: 50px;
    background-color: var(--c9);
    box-shadow: 0 0 20px 30px var(--c12);
    animation: circle-size 0.8s linear infinite alternate;
    transition: background-color 0.35s ease;
  }

  .mic-icon {
    box-sizing: border-box;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(5);
    display: block;
    width: 16px; height: 12px;
    border-bottom-left-radius: 120px;
    border-bottom-right-radius: 120px;
    border: 2px solid #fff;
    border-top: 0;
    margin-top: 20px;
    z-index: 4;
  }
  .mic-icon::before, .mic-icon::after {
    content: ""; display: block; box-sizing: border-box; position: absolute;
  }
  .mic-icon::before {
    width: 2px; height: 5px;
    top: calc(100% + 1px); left: 50%;
    transform: translate(-50%, 0);
    background-color: #fff;
  }
  .mic-icon::after {
    border: 2px solid #fff;
    width: 8px; height: 18px;
    left: 50%; top: -10px;
    border-radius: 4px;
    transform: translate(-50%, 0);
  }

  /* Spinning color halo */
  .mic-shadow {
    width: 350px; height: 350px;
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    z-index: 1;
    box-shadow:
      5px -28px 15px 8px var(--c8),
      12px -5px 24px 5px var(--c7),
      -11px -13px 49px 5px var(--c10),
      26px 3px 9px 5px var(--c11),
      2px 1px 39px 5px var(--c4);
    animation: shadow-rotate 1.5s linear infinite;
    transform-origin: center;
    transition: box-shadow 0.35s ease;
  }

  /* ── IDLE / waiting state ── */
  .mic-wrapper.idle-dim {
    opacity: 0.38;
    cursor: not-allowed;
    filter: none;
  }

  /* ── RECORDING state ──
     We use filter: hue-rotate to shift the blue/teal to red/pink,
     plus brightness to make it pop. This works regardless of
     pseudo-element stacking context issues at scale(0.25).
  */
  .mic-wrapper.recording {
    opacity: 1;
    filter: hue-rotate(195deg) saturate(2.2) brightness(1.25);
    animation: rec-scale-pulse 0.6s ease-in-out infinite alternate;
  }

  /* Small scale pulse so the button visibly "breathes" while recording */
  @keyframes rec-scale-pulse {
    from { transform: translateX(-50%) scale(0.25); }
    to   { transform: translateX(-50%) scale(0.27); }
  }

  @keyframes circle-size {
    from { width: 250px; height: 250px; }
    to   { width: 300px; height: 300px; }
  }
  @keyframes shadow-rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* ── Status label above the mic ── */
  #mic-status-label {
    position: fixed;
    /* sits above the rendered mic: scale(0.25) * 350px/2 ≈ 44px above bottom=80px */
    bottom: 148px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.72rem;
    font-family: 'Poppins', sans-serif;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.45);
    z-index: 51;
    pointer-events: none;
    transition: color 0.3s, opacity 0.3s;
    white-space: nowrap;
  }
  #mic-status-label.ready-label  { color: rgba(255,255,255,0.55); }
  #mic-status-label.rec-label    { color: #ff6fa8; font-weight: 600; }
  #mic-status-label.dim-label    { color: rgba(255,255,255,0.2); }
</style>

<style data-purpose="bubbles">
  .chat-bubble{max-width:80%;padding:1rem 1.5rem;border-radius:1rem;margin-bottom:1.5rem;line-height:1.6;font-size:1.1rem;}
  .bubble-ai{background:rgba(245,245,245,0.08);backdrop-filter:blur(10px);align-self:flex-start;border-bottom-left-radius:0;border:1px solid rgba(255,255,255,0.1);}
  .bubble-user{background:var(--c1);align-self:flex-end;border-bottom-right-radius:0;border:1px solid rgba(255,255,255,0.2);}
  .typing-dots span{animation:blink 1.2s infinite;display:inline-block;margin:0 1px;}
  .typing-dots span:nth-child(2){animation-delay:0.2s;}
  .typing-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{0%,80%,100%{opacity:0.2;}40%{opacity:1;}}
  .bubble-in{animation:bubbleIn 0.35s ease;}
  @keyframes bubbleIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
</style>

<style data-purpose="code-editor">
  #code-editor-section{display:none;flex-direction:column;gap:0.75rem;height:420px;flex-shrink:0;padding-bottom:0.5rem;}
  #code-editor-section.visible{display:flex;animation:editorSlideIn 0.5s ease;}
  @keyframes editorSlideIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
  #monaco-container{flex:1;min-height:340px;border-radius:0.75rem;overflow:hidden;border:1px solid rgba(255,255,255,0.12);box-shadow:0 0 30px rgba(16,3,150,0.2);}
  #submit-code-btn{flex-shrink:0;padding:0.75rem 2rem;background:linear-gradient(135deg,var(--c7),var(--c9));color:white;font-weight:600;border:none;border-radius:0.75rem;cursor:pointer;font-size:1rem;font-family:'Poppins',sans-serif;transition:opacity 0.2s,transform 0.15s;letter-spacing:0.05em;display:flex;align-items:center;justify-content:center;gap:0.5rem;box-shadow:0 0 20px rgba(16,3,150,0.35);}
  #submit-code-btn:hover{opacity:0.85;transform:translateY(-1px);}
  #submit-code-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
</style>

<style data-purpose="completion">
  #completion-screen{display:none;position:fixed;inset:0;background:#050508;z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:2rem;padding:2rem;}
  #completion-screen.show{display:flex;animation:fadeInScreen 0.8s ease;}
  @keyframes fadeInScreen{from{opacity:0;}to{opacity:1;}}
  .completion-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:1.5rem;padding:3rem;max-width:600px;width:100%;text-align:center;backdrop-filter:blur(20px);}

  #download-report-btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(16,3,150,0.6);}
</style>

<style data-purpose="progress">
  .progress-bar-segment{flex:1;}
  .progress-bar-top{height:8px;border-radius:9999px;margin-bottom:4px;transition:background-color 0.5s,box-shadow 0.5s;}
  .seg-done .progress-bar-top{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.4);}
  .seg-active .progress-bar-top{background:#3b82f6;box-shadow:0 0 8px rgba(59,130,246,0.4);}
  .seg-empty .progress-bar-top{background:#1e293b;box-shadow:none;}
  .pb-bottom{height:8px;border-radius:9999px;background:#1e293b;opacity:0.3;}
</style>

<style data-purpose="skeleton">
  /* ─── SKELETON OVERLAY ─────────────────────────────────────────────── */
  #skeleton-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    background: #050508;
    transition: opacity 0.55s ease, visibility 0.55s ease;
  }
  #skeleton-overlay.hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  /* shimmer keyframe */
  @keyframes shimmer {
    0%   { background-position: -600px 0; }
    100% { background-position:  600px 0; }
  }
  .skel {
    background: linear-gradient(
      90deg,
      rgba(255,255,255,0.04) 25%,
      rgba(255,255,255,0.10) 50%,
      rgba(255,255,255,0.04) 75%
    );
    background-size: 600px 100%;
    animation: shimmer 1.6s infinite linear;
    border-radius: 6px;
  }
  .skel-round { border-radius: 9999px; }
  .skel-circle{ border-radius: 50%; }

  /* ── left sidebar skeleton ── */
  .sk-sidebar {
    width: 260px;
    flex-shrink: 0;
    background: #050508;
    border-right: 1px solid rgba(255,255,255,0.05);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .sk-sidebar-header { margin-bottom: 0.5rem; }

  /* ── main chat skeleton ── */
  .sk-main {
    flex: 1;
    padding: 2rem 4rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    background: radial-gradient(circle at center,#16213E 0%,#0A0F2C 100%);
    overflow: hidden;
    position: relative;
  }

  /* ── right sidebar skeleton ── */
  .sk-right {
    width: 300px;
    flex-shrink: 0;
    background: #050508;
    border-left: 1px solid rgba(255,255,255,0.05);
    padding: 2.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  @media(max-width:1200px){ .sk-right { display: none; } }
  @media(max-width:768px)  { .sk-sidebar { display: none; } }

  /* ── loading progress bar (top of page) ── */
  #loading-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    z-index: 300;
    background: rgba(255,255,255,0.05);
    overflow: hidden;
  }
  #loading-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 0 9999px 9999px 0;
    background: linear-gradient(90deg, var(--c7), var(--c10), var(--c8));
    box-shadow: 0 0 12px rgba(143,201,255,0.6);
    transition: width 0.4s ease;
    position: relative;
  }
  /* glint at tip */
  #loading-bar-fill::after {
    content:'';
    position:absolute;
    right:0; top:0; bottom:0;
    width:60px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7));
    border-radius: 9999px;
  }

  /* ── status text below bar ── */
  #loading-status {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    font-family: 'Poppins', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  /* ── mic skeleton (matches real mic position) ── */
  .sk-mic-area {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .sk-mic-circle {
    width: 88px; height: 88px;
    background: rgba(143,201,255,0.06);
    border: 1px solid rgba(143,201,255,0.12);
    border-radius: 50%;
    animation: shimmer 1.6s infinite linear;
    background-size: 600px 100%;
  }
</style>
</head>

<main class="chat-container">

<!-- RIGHT SIDEBAR -->
<aside class="right-sidebar">
  <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6 shadow-xl">
    <div class="flex justify-between items-start">
      <h3 class="text-[10px] uppercase tracking-[0.2em] font-semibold text-white/50">Time Elapsed</h3>
      <span class="material-symbols-outlined text-blue-500 text-xl">timer</span>
    </div>
    <div id="elapsed-display" class="mt-4 text-5xl font-mono font-bold text-white">00:00</div>
    <div class="w-full bg-[#1e293b] h-1.5 mt-6 rounded-full overflow-hidden">
      <div id="elapsed-bar" class="bg-blue-600 h-full rounded-full shadow-[0_0_10px_rgba(37,99,235,0.5)]" style="width:0%;transition:width 1s linear;"></div>
    </div>
  </div>

    <div class="flex justify-between items-center mb-6">
      <h3 class="text-[10px] uppercase tracking-[0.2em] font-semibold text-white/50">Question Progress</h3>
      <span id="q-progress-label" class="text-blue-500 font-bold">0 / 15</span>
    </div>
    <div id="q-progress-bars" class="flex gap-1"></div>
  </div>

  <div class="space-y-3">
    <div class="bg-white/5 border border-white/10 rounded-xl p-4">
      <p class="text-[10px] text-[#8a99b5] uppercase tracking-wider mb-1">Candidate Name</p>
      <p id="right-name" class="text-sm font-semibold text-white">—</p>
    </div>
    <div class="bg-white/5 border border-white/10 rounded-xl p-4">
      <p class="text-[10px] text-[#8a99b5] uppercase tracking-wider mb-1">Interview Position</p>
      <p id="right-role" class="text-sm font-semibold text-white">—</p>
    </div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_BASE        = 'https://ai-interviewer-1-mqxc.onrender.com';
const TOTAL_QUESTIONS = 15;
const BEHAVIORAL_END  = 3;
const DOMAIN_END      = 12;

// ─── STATE ───────────────────────────────────────────────────────────────────
let sessionId        = null;
let candidateName    = '';
let candidateRole    = '';
let deepgramKey      = '';
let qCount           = 0;
let interviewHistory = [];
let elapsedSeconds   = 0;
let elapsedTimer     = null;
let isRecording      = false;
let mediaRecorder    = null;
let audioChunks      = [];
let monacoEditor     = null;
let currentRound     = 'behavioral';
let awaitingAnswer   = false;
let audioUnlocked    = false;
let audioCtx         = null;

// ─── LOADING BAR HELPERS ─────────────────────────────────────────────────────
const LOAD_STEPS = [
  { pct: 8,  label: 'Initializing session…'        },
  { pct: 22, label: 'Waking up server…'             },
  { pct: 40, label: 'Connecting to AI…'             },
  { pct: 60, label: 'Preparing your interview…'     },
  { pct: 80, label: 'Almost ready…'                 },
  { pct: 100, label: 'Starting interview…'          },
];
let _loadStep = 0;

function setLoadProgress(pct, label) {
  const fill   = document.getElementById('loading-bar-fill');
  const status = document.getElementById('loading-status');
  if (fill)   fill.style.width = pct + '%';
  if (status && label) status.textContent = label;
}

function advanceLoad() {
  if (_loadStep < LOAD_STEPS.length) {
    const { pct, label } = LOAD_STEPS[_loadStep++];
    setLoadProgress(pct, label);
  }
}

function startColdStartCrawl() {
  let current = 22;
  const crawl = setInterval(() => {
    if (current >= 72) { clearInterval(crawl); return; }
    current += 0.35;
    const fill = document.getElementById('loading-bar-fill');
    if (fill) fill.style.width = current + '%';
  }, 400);
  return crawl;
}

function hideSkeleton() {
  setLoadProgress(100, 'Starting interview…');
  setTimeout(() => {
    const ov  = document.getElementById('skeleton-overlay');
    const bar = document.getElementById('loading-bar-wrap');
    const lbl = document.getElementById('loading-status');
    if (ov)  ov.classList.add('hide');
    if (bar) { bar.style.transition='opacity 0.6s'; bar.style.opacity='0'; setTimeout(()=>bar.remove(),700); }
    if (lbl) { lbl.style.opacity='0'; setTimeout(()=>lbl.remove(),700); }
  }, 320);
}

function showFatalError(msg) {
  const ov = document.getElementById('skeleton-overlay');
  if (ov) ov.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:100%;gap:1.5rem;font-family:Poppins,sans-serif;color:white;text-align:center;padding:2rem;">
      <div style="font-size:2.5rem;">😔</div>
      <p style="font-size:1.1rem;font-weight:600;">${msg}</p>
      <p style="color:rgba(255,255,255,0.5);font-size:0.9rem;">The server may be overloaded. Please try again.</p>
      <a href="index.html" style="padding:0.75rem 2rem;background:#100396;color:white;
        border-radius:0.75rem;text-decoration:none;font-weight:600;margin-top:0.5rem;">← Try Again</a>
    </div>`;
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  advanceLoad(); // step 1 — Initializing

  sessionId     = localStorage.getItem('session_id');
  candidateName = localStorage.getItem('candidate_name') || '';
  candidateRole = localStorage.getItem('candidate_role') || '';
  const isFresher = localStorage.getItem('is_fresher') === 'true';
  let greeting  = localStorage.getItem('greeting') || '';

  // Guard: need at least name to proceed
  if (!candidateName) {
    showFatalError('No session details found.');
    document.querySelector('#skeleton-overlay a') &&
      (document.querySelector('#skeleton-overlay p').textContent = 'No session details found.');
    return;
  }

  advanceLoad(); // step 2 — Waking up server

  // ── No session_id = redirected immediately from index, call /startinterview here ──
  if (!sessionId) {
    const crawl = startColdStartCrawl();
    setLoadProgress(22, 'Waking up server… (first load may take ~60s)');

    let attempts = 0;
    while (attempts < 8) {
      try {
        const res = await fetch(`${API_BASE}/startinterview`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: candidateName, role: candidateRole, is_fresher: isFresher })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        sessionId = data.session_id;
        greeting  = data.greeting || '';
        localStorage.setItem('session_id', sessionId);
        localStorage.setItem('greeting', greeting);
        clearInterval(crawl);
        break;
      } catch {
        attempts++;
        setLoadProgress(
          parseFloat(document.getElementById('loading-bar-fill')?.style.width || '22'),
          `Server waking up… retrying (${attempts}/8)`
        );
        await new Promise(r => setTimeout(r, attempts <= 3 ? 10000 : 15000));
      }
    }

    if (!sessionId) {
      clearInterval(crawl);
      showFatalError('Server took too long to respond.');
      return;
    }
  }

  advanceLoad(); // step 3 — Connecting to AI

  try {
    const cfgRes = await fetch(`${API_BASE}/config`);
    if (cfgRes.ok) deepgramKey = (await cfgRes.json()).stt_key || '';
  } catch { console.warn('GET /config not available — TTS/STT disabled'); }

  advanceLoad(); // step 4 — Preparing interview

  document.getElementById('sidebar-name').textContent = candidateName || '—';
  document.getElementById('sidebar-role').textContent = candidateRole || '—';
  document.getElementById('right-name').textContent   = candidateName || '—';
  document.getElementById('right-role').textContent   = candidateRole || '—';

  buildProgressBars();
  startElapsedTimer();

  advanceLoad(); // step 5 — Almost ready

  hideSkeleton();
  await showGreetingAndStart(greeting);
});

// ─── GREETING + FIRST QUESTION ────────────────────────────────────────────────
async function showGreetingAndStart(greeting) {
  const msg = greeting || `Hello ${candidateName || 'there'}! Welcome to your AI interview. Let's begin.`;
  addAIBubble(msg);
  await speakText(msg);
  await fetchAndAskQuestion();
}

async function fetchAndAskQuestion() {
  setMicReady(false);
  try {
    const data = await (await fetch(`${API_BASE}/question/${sessionId}`)).json();
    if (data.question) {
      addAIBubble(data.question);
      await speakText(data.question);
      awaitingAnswer = true;
      if (currentRound !== 'technical') setMicReady(true);
    }
  } catch { addAIBubble('Connection error — please check the server.'); }
}

// ─── SUBMIT ANSWER ────────────────────────────────────────────────────────────
async function submitAnswer(answerText) {
  if (!awaitingAnswer || !answerText.trim()) return;
  awaitingAnswer = false;
  setMicReady(false);
  addUserBubble(answerText);

  try {
    const res  = await fetch(`${API_BASE}/answer/${sessionId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answer: answerText })
    });
    const data = await res.json();

    // Session lost (server restarted mid-interview)
    if (data.error && data.error.toLowerCase().includes('invalid session')) {
      addAIBubble('⚠️ The server was restarted and your session was lost. Please start a new interview.');
      setTimeout(() => {
        localStorage.clear();
        window.location.href = 'index.html';
      }, 4000);
      return;
    }

    qCount++;
    updateProgressBars();
    updateRoundNav();

    if (data.interview_completed) {
      const endMsg = data.message || 'Thank you — the interview is now complete!';
      addAIBubble(endMsg);
      await speakText(endMsg);
      setTimeout(() => showCompletion(endMsg), 2500);
      return;
    }

    if (data.question) {
      if (qCount === DOMAIN_END)
    switchToTechnicalRound();
      addAIBubble(data.question);
      await speakText(data.question);
      awaitingAnswer = true;
      if (currentRound !== 'technical') setMicReady(true);
    }
  } catch {
    addAIBubble('Connection error — please try again.');
    awaitingAnswer = true;
    if (currentRound !== 'technical') setMicReady(true);
  }
}

// ─── ROUND NAV ────────────────────────────────────────────────────────────────
function updateRoundNav() {
  let newRound = 'behavioral';
  if      (qCount >= DOMAIN_END)     newRound = 'technical';
  else if (qCount >= BEHAVIORAL_END) newRound = 'domain';
  if (newRound === currentRound) return;

  const navMap   = {behavioral:'nav-behavioral', domain:'nav-domain', technical:'nav-technical'};
  const labelMap = {behavioral:'Behavioral', domain:'Domain-based', technical:'Technical'};

  const prevEl = document.getElementById(navMap[currentRound]);
  if (prevEl) { prevEl.classList.remove('active'); prevEl.classList.add('completed','round-transition'); }

  currentRound = newRound;

  const nextEl = document.getElementById(navMap[currentRound]);
  if (nextEl) {
    nextEl.classList.remove('round-transition');
    void nextEl.offsetWidth;
    nextEl.classList.add('active','round-transition');
  }
  document.getElementById('sidebar-round-label').textContent = `Round: ${labelMap[currentRound]}`;
}

// ─── TECHNICAL ROUND ─────────────────────────────────────────────────────────
function switchToTechnicalRound() {
  document.getElementById('mic-btn').style.display = 'none';
  document.getElementById('mic-status-label').style.display = 'none';
  document.getElementById('chat-transcript').style.paddingBottom = '16px';

  const editorEl = document.getElementById('code-editor-section');
  editorEl.classList.add('visible');

  if (!monacoEditor) {
    require.config({ paths:{ vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    require(['vs/editor/editor.main'], () => {
      monacoEditor = monaco.editor.create(document.getElementById('monaco-container'), {
        value: '// Write your solution here\n\n',
        language: 'javascript',
        theme: 'vs-dark',
        fontSize: 14,
        minimap: {enabled:false},
        scrollBeyondLastLine: false,
        automaticLayout: true,
        padding: {top:12, bottom:12},
      });
    });
  }
}

async function submitCode() {
  const btn  = document.getElementById('submit-code-btn');
  const code = monacoEditor ? monacoEditor.getValue() : '';
  if (!code.trim() || code.trim() === '// Write your solution here') {
    btn.style.boxShadow = '0 0 0 2px #f87171';
    setTimeout(() => btn.style.boxShadow = '', 1200);
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:1rem;">hourglass_top</span> Submitting…';
  await submitAnswer(code);
  if (monacoEditor) monacoEditor.setValue('// Write your solution here\n\n');
  btn.disabled = false;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:1rem;">send</span> Submit Code';
}

// ─── MIC HELPERS ─────────────────────────────────────────────────────────────
function setMicReady(ready) {
  const btn   = document.getElementById('mic-btn');
  const label = document.getElementById('mic-status-label');
  if (ready) {
    btn.classList.remove('idle-dim');
    label.textContent = 'Tap to speak';
    label.className   = 'ready-label';
  } else {
    btn.classList.add('idle-dim');
    label.textContent = 'Please wait…';
    label.className   = 'dim-label';
  }
}

async function toggleMic() {
  if (!awaitingAnswer || currentRound === 'technical') return;
  unlockAudio(); // unlock audio pipeline on first mic tap (mobile requirement)
  isRecording ? stopRecording() : await startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks  = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      await transcribeAudio(new Blob(audioChunks, {type:'audio/webm'}));
    };
    mediaRecorder.start();
    isRecording = true;

    // ── Apply recording visual ──
    const btn   = document.getElementById('mic-btn');
    const label = document.getElementById('mic-status-label');
    btn.classList.remove('idle-dim');
    btn.classList.add('recording');       // triggers filter + scale pulse
    label.textContent = '● Recording — tap to stop';
    label.className   = 'rec-label';

    removeListeningIndicator();
    addListeningBubble();
  } catch (e) {
    console.error('Mic error:', e);
    addAIBubble('Microphone access denied. Please allow mic permissions and try again.');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;

  const btn   = document.getElementById('mic-btn');
  const label = document.getElementById('mic-status-label');
  btn.classList.remove('recording');
  btn.classList.add('idle-dim');
  label.textContent = 'Processing…';
  label.className   = 'dim-label';
  removeListeningIndicator();
}

// ─── DEEPGRAM STT ─────────────────────────────────────────────────────────────
async function transcribeAudio(blob) {
  if (!deepgramKey) {
    addAIBubble('STT key missing — ensure /config returns {"stt_key":"..."} and STTKEY is in your .env');
    setMicReady(true); return;
  }
  addProcessingBubble();
  try {
    const res = await fetch('https://api.deepgram.com/v1/listen?model=nova-2&punctuate=true&language=en', {
      method: 'POST',
      headers: {'Authorization':`Token ${deepgramKey}`, 'Content-Type':'audio/webm'},
      body: await blob.arrayBuffer()
    });
    const transcript = (await res.json())?.results?.channels?.[0]?.alternatives?.[0]?.transcript?.trim() || '';
    removeProcessingIndicator();
    if (transcript) {
      await submitAnswer(transcript);
    } else {
      addListeningBubble("Couldn't hear clearly — tap to try again.");
      setMicReady(true);
    }
  } catch {
    removeProcessingIndicator();
    addListeningBubble('Transcription failed — tap to try again.');
    setMicReady(true);
  }
}

// ─── DEEPGRAM TTS ─────────────────────────────────────────────────────────────
// ── Unlock audio on first user gesture (required for iOS/Android) ──
function unlockAudio() {
  if (audioUnlocked) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Play a silent buffer to fully unlock the audio pipeline
    const buf = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioUnlocked = true;
  } catch(e) { /* best effort */ }
}

async function speakText(text) {
  if (!deepgramKey) return;
  try {
    const res = await fetch('https://api.deepgram.com/v1/speak?model=aura-asteria-en', {
      method: 'POST',
      headers: {'Authorization':`Token ${deepgramKey}`, 'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    if (!res.ok) return;

    const arrayBuf = await res.arrayBuffer();

    // ── Path 1: AudioContext (mobile-safe, bypasses autoplay block) ──
    if (audioCtx && audioUnlocked) {
      return new Promise(resolve => {
        audioCtx.decodeAudioData(arrayBuf, decoded => {
          const src = audioCtx.createBufferSource();
          src.buffer = decoded;
          src.connect(audioCtx.destination);
          src.onended = resolve;
          src.start(0);
        }, () => resolve()); // decode error fallback
      });
    }

    // ── Path 2: Fallback — standard Audio element (desktop) ──
    const url = URL.createObjectURL(new Blob([arrayBuf], {type:'audio/mpeg'}));
    return new Promise(resolve => {
      const audio = new Audio(url);
      audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      audio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
      audio.play().catch(() => { URL.revokeObjectURL(url); resolve(); });
    });

  } catch { /* skip */ }
}

// ─── CHAT HELPERS ─────────────────────────────────────────────────────────────
function addAIBubble(text) {
  removeListeningIndicator(); removeProcessingIndicator();
  const el = document.createElement('article');
  el.className = 'chat-bubble bubble-ai bubble-in';
  el.innerHTML = `<p class="text-xs uppercase tracking-widest opacity-50 mb-2">Interviewer</p><p>${escHtml(text)}</p>`;
  document.getElementById('chat-transcript').appendChild(el);
  scrollToBottom();
}
function addUserBubble(text) {
  const el = document.createElement('article');
  el.className = 'chat-bubble bubble-user bubble-in';
  el.innerHTML = `<p class="text-xs uppercase tracking-widest opacity-50 mb-2 text-right">You</p><p>${escHtml(text)}</p>`;
  document.getElementById('chat-transcript').appendChild(el);
  scrollToBottom();
}
function addListeningBubble(msg) {
  removeListeningIndicator();
  const el = document.createElement('div');
  el.id = 'listening-indicator';
  el.className = 'chat-bubble bubble-user bubble-in';
  el.style.cssText = 'opacity:.7;font-style:italic;font-size:.95rem;';
  el.innerHTML = msg || `<span class="typing-dots"><span>●</span><span>●</span><span>●</span></span>&nbsp;Listening…`;
  document.getElementById('chat-transcript').appendChild(el);
  scrollToBottom();
}
function addProcessingBubble() {
  removeProcessingIndicator();
  const el = document.createElement('div');
  el.id = 'processing-indicator';
  el.className = 'chat-bubble bubble-user bubble-in';
  el.style.cssText = 'opacity:.7;font-style:italic;font-size:.95rem;';
  el.innerHTML = `<span class="typing-dots"><span>●</span><span>●</span><span>●</span></span>&nbsp;Processing…`;
  document.getElementById('chat-transcript').appendChild(el);
  scrollToBottom();
}
function removeListeningIndicator()  { document.getElementById('listening-indicator')?.remove(); }
function removeProcessingIndicator() { document.getElementById('processing-indicator')?.remove(); }
function scrollToBottom() {
  const s = document.getElementById('chat-transcript');
  s.scrollTop = s.scrollHeight;
}
function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');
}

// ─── PROGRESS BARS ────────────────────────────────────────────────────────────
function buildProgressBars() {
  const c = document.getElementById('q-progress-bars');
  c.innerHTML = '';
  for (let i = 0; i < TOTAL_QUESTIONS; i++) {
    const s = document.createElement('div');
    s.id = `seg-${i}`;
    s.className = 'progress-bar-segment seg-empty';
    s.innerHTML = `<div class="progress-bar-top"></div><div class="pb-bottom"></div>`;
    c.appendChild(s);
  }
}
function updateProgressBars() {
  document.getElementById('q-progress-label').textContent = `${qCount} / ${TOTAL_QUESTIONS}`;
  for (let i = 0; i < TOTAL_QUESTIONS; i++) {
    const s = document.getElementById(`seg-${i}`);
    if (!s) continue;
    s.className = 'progress-bar-segment ' + (i < qCount ? 'seg-done' : i === qCount ? 'seg-active' : 'seg-empty');
  }
}

// ─── ELAPSED TIMER ────────────────────────────────────────────────────────────
function startElapsedTimer() {
  elapsedTimer = setInterval(() => {
    elapsedSeconds++;
    const mm = String(Math.floor(elapsedSeconds / 60)).padStart(2,'0');
    const ss = String(elapsedSeconds % 60).padStart(2,'0');
    const fmt = `${mm}:${ss}`;
    document.getElementById('elapsed-display').textContent = fmt;
    document.getElementById('sidebar-elapsed').textContent = `Elapsed: ${fmt}`;
    document.getElementById('elapsed-bar').style.width = Math.min((elapsedSeconds/3600)*100,100)+'%';
  }, 1000);
}

// ─── COMPLETION ───────────────────────────────────────────────────────────────
function showCompletion(message) {
  clearInterval(elapsedTimer);
  document.getElementById('completion-message').textContent = message;
  document.getElementById('completion-screen').classList.add('show');
}
async function downloadReport() {
  const btn = document.getElementById('download-report-btn');
  if (!sessionId) { alert('No active session found.'); return; }

  // Show loading state
  const originalHTML = btn.innerHTML;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:1.1rem;animation:spin 1s linear infinite;display:inline-block;">sync</span> Generating PDF…';
  btn.style.opacity = '0.7';
  btn.style.pointerEvents = 'none';

  // Add spin keyframe if not present
  if (!document.getElementById('spin-style')) {
    const s = document.createElement('style');
    s.id = 'spin-style';
    s.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }

  try {
    const res = await fetch(`${API_BASE}/report/${sessionId}`);
    if (!res.ok) throw new Error(`Server returned ${res.status}`);

    const blob     = await res.blob();
    const url      = URL.createObjectURL(blob);
    const safeName = (candidateName || 'candidate').replace(/\s+/g, '_');
    const a        = document.createElement('a');
    a.href         = url;
    a.download     = `interview_report_${safeName}.pdf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    console.error('PDF download failed:', err);
    alert('Could not generate report. Please check the server is running.');
  } finally {
    btn.innerHTML       = originalHTML;
    btn.style.opacity   = '1';
    btn.style.pointerEvents = 'auto';
  }
}
</script>
